services:
  story-teller-bot:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: story_teller_bot
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models_cache
      - HUGGINGFACE_HUB_CACHE=/app/models_cache/hub
      - TRANSFORMERS_CACHE=/app/models_cache/hub
      - WHISPER_MODEL=base
      - TEXT_GENERATION_MODEL=gpt2
    volumes:
      - logs_volume:/app/logs
      - audio_output_volume:/app/audio_output
      - models_cache_volume:/app/models_cache
    ports:
      - "8000:8000"
    devices:
      # For audio input/output
      - /dev/snd:/dev/snd
    cap_add:
      - SYS_PTRACE
    restart: unless-stopped
    # Default: interactive mode
    # To pass arguments, use docker-compose exec or override command:
    # command: python -m src.bot --text "king and a lion"
    healthcheck:
      test: ["CMD", "python", "-c", "print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - story_teller_network

networks:
  story_teller_network:
    driver: bridge

volumes:
  logs_volume:
    driver: local
  audio_output_volume:
    driver: local
  models_cache_volume:
    driver: local
